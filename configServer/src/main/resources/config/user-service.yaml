spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/fitness_application
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update   # (create / create-drop / validate / none)
    show-sql: true
    properties:
      hibernate:
#        jdbc:
#          time_zone: Asia/Kolkata
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    register-with-eureka: true   # Eureka pe register kare
    fetch-registry: true         # dusri services ko fetch kare
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true